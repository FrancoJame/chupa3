{% extends 'base.html' %}

{% block title %}Login - CHUPA ku CHUPA{% endblock %}

{% block extra_css %}
<style>
    /* Responsive login form */
    .auth-container {
        max-width: 100%;
        padding: 0 1rem;
    }

    @media (min-width: 768px) {
        .auth-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0;
        }
    }

    .auth-card {
        min-height: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .input-group .form-control {
        border-right: none;
    }

    .input-group .btn {
        border-left: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="animate-fade">
    <div class="auth-container">
        <div class="glass-card auth-card">
            <h2 class="text-center mb-4">Welcome Back</h2>
            <form method="post">
                {% csrf_token %}
                {% if request.GET.next %}
                    <input type="hidden" name="next" value="{{ request.GET.next }}">
                {% endif %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="id_password" class="form-control bg-dark text-white border-secondary" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('id_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-gold w-100 py-3 fw-bold">Login</button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-white-50">Don't have an account? <a href="{% url 'signup' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" class="text-gold text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
</script>
{% endblock %}
